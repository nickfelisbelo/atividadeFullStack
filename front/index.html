<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>
        <h1>Tela de Login</h1>
    </header>

    <div class="container">

        <div class="card">

            <h2>Login</h2>

            <input type="email" id="email" placeholder="E-mail">

            <input type="password" id="senha" placeholder="Senha">

            <button onclick="login()">
                Entrar
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
